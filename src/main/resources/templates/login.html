<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系统登录 - 学生信息管理</title>
    <!-- 统一Bootstrap样式，和列表/新增页面保持一致 -->
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            background-color: #f5f7fa;
        }
    </style>
</head>
<body class="w-100">
<div class="container" style="max-width:420px;">
    <div class="card shadow-lg p-4">
        <h2 class="text-center text-primary mb-4">学生信息管理系统</h2>
        <h5 class="text-center text-secondary mb-4">管理员登录</h5>


        <!-- 登录失败提示 -->
        <div th:if="${msg}" class="alert alert-danger text-center" th:text="${msg}"></div>

        <form th:action="@{/login}" method="post" id="loginForm">
            <div class="mb-3">
                <label class="form-label">账号</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="请输入账号">
            </div>
            <div class="mb-4">
                <label class="form-label">密码</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码">
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">登录系统</button>
            </div>
        </form>

        <script>
            // 前端非空校验
            $("#loginForm").submit(function () {
                if ($("#username").val().trim() === "") {
                    alert("账号不能为空！");
                    return false;
                }
                if ($("#password").val().trim() === "") {
                    alert("密码不能为空！");
                    return false;
                }
            })
        </script>
    </div>
</div>
</body>
</html>
